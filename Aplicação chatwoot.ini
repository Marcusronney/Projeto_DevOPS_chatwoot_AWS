# Infraestrutura AWS para Chatwoot

Diagrama inicial

````
                        ┌──────────────────────────────────────────────┐
                        │                    AWS                        │
                        └──────────────────────────────────────────────┘

 Usuário/Internet
        |
        |  DNS
        v
   Route 53  ───────────────>  ACM (certificado TLS)
        |
        v
  ALB (Ingress)  [subnets públicas, 2+ AZs]
        |
        |  HTTP/HTTPS (interno)
        v
  EKS Cluster  [subnets privadas, 2+ AZs]
    |
    |-- Namespace: chatwoot
    |     |
    |     |  (pull image)
    |     v
    |   Pods Chatwoot Web (Rails/Puma)  <---- HPA
    |     |
    |     |  jobs/queues
    |     v
    |   Pods Chatwoot Worker (Sidekiq) <---- HPA (opcional)
    |
    |-- Add-ons (kube-system / ops)
          - AWS Load Balancer Controller (gera/gerencia ALB)
          - ExternalDNS (atualiza Route53)
          - cert-manager (opcional se usar ACM via ALB já resolve TLS)
          - metrics-server (HPA)
          - CloudWatch/OTel (logs/métricas) ou Prometheus/Grafana

 Dados / Serviços gerenciados (privados)
    |
    +--> RDS PostgreSQL (Multi-AZ, subnets privadas, SG restrito)
    |
    +--> ElastiCache Redis (subnets privadas, SG restrito)
    |
    +--> S3 Bucket (attachments ActiveStorage)
    |
    +--> Secrets Manager / SSM Parameter Store (segredos)
    |
    +--> ECR (imagens)
    ````



Conta AWS:
Uma conta AWS e permissões de admin (ou um role com IAM/VPC/EKS/RDS/ElastiCache/S3/ECR/Route53/ACM)

Região escolhida (ex.: us-east-1)

````
chatwoot-aws/
  infra/
    live/
      dev/
        backend.tf
        providers.tf
        main.tf
        variables.tf
        outputs.tf
        terraform.tfvars
    modules/
      network/
      eks/
      ecr/
      rds/
      redis/
      s3/
      iam/
````

# Criando Bucket S3 para state do Terraform
O Backend remoto do Terraform (S3 + DynamoDB)

Isso é o padrão pra evitar state local e concorrência.

Porque o backend precisa existir antes do Terraform rodar. O Terraform não pode usar um bucket que ele ainda vai criar.


````
aws s3api create-bucket \
  --bucket bucketchatwootprojetoaws \
  --region us-east-1

  

aws s3api put-bucket-versioning \
  --bucket bucketchatwootprojetoaws \
  --versioning-configuration Status=Enabled

aws dynamodb create-table \
  --table-name bucketchatwootlock \
  --attribute-definitions AttributeName=LockID,AttributeType=S \
  --key-schema AttributeName=LockID,KeyType=HASH \
  --billing-mode PAY_PER_REQUEST
  ````


````
Terraform CLI
     |
     |--- lê backend config
     |
     |--- acessa S3 bucket
     |         |
     |         └── terraform.tfstate
     |
     |--- usa DynamoDB para lock
````

O Projeto possuí 2 Buckets

Bucket de STATE (infra)

Bucket de ATTACHMENTS (Chatwoot / ActiveStorage)




















