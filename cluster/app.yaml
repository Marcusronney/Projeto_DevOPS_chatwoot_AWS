apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chatwoot-root
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/Marcusronney/Projeto_DevOPS_chatwoot_AWS
    targetRevision: main
    path: clusters/dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true