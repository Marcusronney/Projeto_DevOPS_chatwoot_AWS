# -------------------------
# Ingress (AWS Load Balancer Controller) + ExternalDNS
# -------------------------
ingress:
  enabled: true
  ingressClassName: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: "ACM_CERTIFICATE_ARN"
    external-dns.alpha.kubernetes.io/hostname: "chatwoot.seudominio.com"
  hosts:
    - host: "chatwoot.seudominio.com"
      paths:
        - path: /
          pathType: Prefix

# -------------------------
# Postgres externo (RDS)
# -------------------------
postgresql:
  enabled: false
  postgresqlHost: "RDS_ENDPOINT"
  postgresqlPort: 5432
  auth:
    username: "DB_USER"
    database: "DB_NAME"
    postgresPassword: ""  # vem do Secret via extraEnvVars abaixo

# injeta segredo no pod
extraEnvVars:
  - name: SECRET_KEY_BASE
    valueFrom:
      secretKeyRef:
        name: chatwoot-secrets
        key: SECRET_KEY_BASE

  - name: POSTGRES_PASSWORD
    valueFrom:
      secretKeyRef:
        name: chatwoot-secrets
        key: POSTGRES_PASSWORD

# -------------------------
# Redis interno (para não depender do ElastiCache sem AUTH)
# -------------------------
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    existingSecret: chatwoot-secrets
    existingSecretPasswordKey: REDIS_PASSWORD
  master:
    persistence:
      enabled: false

# -------------------------
# Env do Chatwoot (S3 + URL)
# -------------------------
env:
  FRONTEND_URL: "https://chatwoot.seudominio.com"
  FORCE_SSL: "true"

  # S3 attachments
  ACTIVE_STORAGE_SERVICE: "amazon"
  S3_BUCKET_NAME: "S3_BUCKET_NAME"
  AWS_REGION: "us-east-1"

  # se você não usar IRSA por enquanto, poderia colocar chaves aqui (não recomendado)
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""

  ENABLE_ACCOUNT_SIGNUP: "false"